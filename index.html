<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Super Tool</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root { --primary: #4f46e5; --secondary: #10b981; }
        body { font-family: sans-serif; background: #f3f4f6; margin: 0; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 2rem; border-radius: 1rem; shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        
        /* Tabs per navigare */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-bottom: 3px solid #ddd; font-weight: bold; }
        .tab.active { border-color: var(--primary); color: var(--primary); }
        
        .section { display: none; }
        .section.active { display: block; }

        .upload-area { border: 2px dashed #d1d5db; padding: 2rem; border-radius: 0.5rem; margin: 1rem 0; cursor: pointer; }
        input[type="file"] { display: none; }
        
        button { width: 100%; padding: 1rem; border-radius: 0.5rem; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-merge { background: var(--primary); }
        .btn-split { background: var(--secondary); }
        button:disabled { background: #ccc; }
        
        #status { margin-top: 15px; font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h1>PDF Super Tool 🛠️</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('merge')">Unisci</div>
        <div class="tab" onclick="switchTab('split')">Dividi</div>
    </div>

    <div id="merge-section" class="section active">
        <p>Seleziona 2 o più file per unirli.</p>
        <div class="upload-area" onclick="document.getElementById('mergeInput').click()">
            <span id="mergeLabel">📁 Clicca per caricare i PDF</span>
            <input type="file" id="mergeInput" accept=".pdf" multiple>
        </div>
        <button id="mergeBtn" class="btn-merge" disabled>Unisci e Scarica</button>
    </div>

    <div id="split-section" class="section">
        <p>Carica un PDF per estrarre ogni pagina singolarmente.</p>
        <div class="upload-area" onclick="document.getElementById('splitInput').click()">
            <span id="splitLabel">📄 Clicca per caricare il PDF</span>
            <input type="file" id="splitInput" accept=".pdf">
        </div>
        <button id="splitBtn" class="btn-split" disabled>Dividi in Pagine (ZIP)</button>
    </div>

    <div id="status"></div>
</div>

<script>
    const { PDFDocument } = PDFLib;

    // --- LOGICA NAVIGAZIONE ---
    function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(type + '-section').classList.add('active');
        document.getElementById('status').innerText = "";
    }

    // --- LOGICA UNIONE ---
    const mergeInput = document.getElementById('mergeInput');
    const mergeBtn = document.getElementById('mergeBtn');

    mergeInput.onchange = () => {
        mergeBtn.disabled = mergeInput.files.length < 2;
        document.getElementById('mergeLabel').innerText = mergeInput.files.length + " file selezionati";
    };

    mergeBtn.onclick = async () => {
        const status = document.getElementById('status');
        status.innerText = "⏳ Unione in corso...";
        const mergedPdf = await PDFDocument.create();
        for (const file of mergeInput.files) {
            const pdf = await PDFDocument.load(await file.arrayBuffer());
            const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
            pages.forEach(p => mergedPdf.addPage(p));
        }
        const bytes = await mergedPdf.save();
        downloadBlob(bytes, "pdf_unito.pdf");
        status.innerText = "✅ Unione completata!";
    };

    // --- LOGICA DIVISIONE ---
    const splitInput = document.getElementById('splitInput');
    const splitBtn = document.getElementById('splitBtn');

    splitInput.onchange = () => {
        splitBtn.disabled = splitInput.files.length === 0;
        document.getElementById('splitLabel').innerText = splitInput.files[0].name;
    };

    splitBtn.onclick = async () => {
        const status = document.getElementById('status');
        status.innerText = "⏳ Divisione in corso... Creazione ZIP...";
        const file = splitInput.files[0];
        const mainPdf = await PDFDocument.load(await file.arrayBuffer());
        const pageCount = mainPdf.getPageCount();
        const zip = new JSZip();

        for (let i = 0; i < pageCount; i++) {
            const newPdf = await PDFDocument.create();
            const [page] = await newPdf.copyPages(mainPdf, [i]);
            newPdf.addPage(page);
            const bytes = await newPdf.save();
            zip.file(`pagina_${i + 1}.pdf`, bytes);
        }

        const zipContent = await zip.generateAsync({type: "blob"});
        downloadBlob(zipContent, "pagine_estratte.zip");
        status.innerText = "✅ ZIP creato con " + pageCount + " pagine!";
    };

    function downloadBlob(data, name) {
        const blob = new Blob([data], { type: data.type || 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        a.click();
    }
</script>

</body>
</html>
